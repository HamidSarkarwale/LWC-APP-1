<template>
    <lightning-card title="view Account with LDS forms">
        <lightning-layout>
            <lightning-layout-item size="6" name="create Account Record">
                <lightning-record-edit-form object-api-name={objectApiName} onsuccess={handlesuccess}>
                    <lightning-input-field field-name="Name"></lightning-input-field>
                    <lightning-input-field field-name="Phone"></lightning-input-field>
                    <lightning-input-field field-name="Website"></lightning-input-field>

                    <lightning-button type="submit" label="Create Account"></lightning-button>
                </lightning-record-edit-form>
            </lightning-layout-item>

             <lightning-layout-item size="6" name="view Account Record">
                <lightning-record-view-form record-id={recordId} object-api-name={objectApiName}>
                    <lightning-output-field field-name="Name"></lightning-output-field>
                    <lightning-output-field field-name="Phone"></lightning-output-field>
                    <lightning-output-field field-name="Website"></lightning-output-field>
                </lightning-record-view-form>
            </lightning-layout-item>

        </lightning-layout>
    </lightning-card>
</template>
